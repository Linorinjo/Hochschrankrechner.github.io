<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Clicker</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
</head>

<body>
    <!-- Always shows a header, even in smaller screens. -->
    <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">
        <header class="mdl-layout__header">
            <div class="mdl-layout__header-row">
                <!-- Title -->
                <span class="mdl-layout-title">Brainrot Clicker</span>
                <!-- Add spacer, to align navigation to the right -->
                <div class="mdl-layout-spacer"></div>
                <!-- Navigation. We hide it in small screens. -->
                <nav class="mdl-navigation mdl-layout--large-screen-only">
                </nav>
            </div>
        </header>
        <div class="mdl-layout__drawer">
            <span class="mdl-layout-title">Admin Panel</span>
            <nav class="mdl-navigation">
                <form onsubmit="admin(); return false">
                    <input type="password" class="mdl-navigation__link" id="admininput">
                    <input type="number" class="mdl-navigation__link" id="valuehacker">
                    <button type="submit" class="mdl-navigation__link">Admin</button>
                </form>
            </nav>
        </div>
        <main class="mdl-layout__content">
            <div class="page-content"><!-- Your content goes here --></div>

            <h2 id="display">Score: 0</h2>
            <button onclick="clicked()">Klick mich!</button>
            
            <button onclick="sub()" id="subbutton" class="buttonevents">Subway Surfers (-10) (+2 (1sek))</button>
            
            <button onclick="min()" id="jumpbtn" class="buttonevents">Minecraft (-200) (+20 (1sek))</button>

            <button onclick="fam()" id="familyguybtn" class="buttonevents">Family Guy (-800) (+50 (1sek))</button>

            <button onclick="goldbtn()" id="betterbtn" class="buttonevents">Golden Button (-1000) (+5) (pro Click)</button>

            <div class="videos">
            <video autoplay class="vids" id="subway" muted>
                <source src="./vids/Subway.mp4" type="video/mp4">
                <source src="movie.ogg" type="video/ogg">
                Your browser does not support the video tag.
            </video>

            <video autoplay class="vids" id="jumpnrun" muted>
                <source src="./vids/Minecraft.mp4" type="video/mp4">
                <source src="movie.ogg" type="video/ogg">
                Your browser does not support the video tag.
            </video>



            <video autoplay class="vids" id="familyguy" muted>
                <source src="./vids/familyguymp4.mp4" type="video/mp4">
                <source src="movie.ogg" type="video/ogg">
                Your browser does not support the video tag.
            </video>
            </div>


        </main>
    </div>
</body>

</html>
